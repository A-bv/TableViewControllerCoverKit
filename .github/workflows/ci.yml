name: CI

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build and test
        run: |
          set -o pipefail
          # Resolve an available iPhone simulator by UDID so CI doesn't break
          # when the runner image's device roster changes.
          DEVICE=$(xcrun simctl list devices available -j | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; rows=[x for rt,l in d.items() if 'iOS' in rt for x in l if x['name'].startswith('iPhone')]; print(sorted(rows, key=lambda x: x['name'])[-1]['udid'])")
          xcodebuild test \
            -scheme TableViewControllerCoverKit \
            -destination "id=$DEVICE" \
            CODE_SIGNING_ALLOWED=NO
