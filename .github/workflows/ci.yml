name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (iOS Simulator)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run tests
        run: |
          # Select a simulator by UDID, not by name: device names can contain parentheses
          # (e.g. "iPhone SE (3rd generation)") that break name-based parsing/matching.
          UDID=$(xcrun simctl list devices available --json \
            | python3 -c "import json,sys; devs=json.load(sys.stdin)['devices']; print(next((d['udid'] for rt in devs for d in devs[rt] if d['name'].startswith('iPhone')), ''))")
          if [ -z "$UDID" ]; then
            echo "::error::No available iPhone simulator found"
            exit 1
          fi
          echo "Testing on simulator UDID: $UDID"
          xcodebuild test \
            -scheme TableViewControllerCoverKit \
            -destination "platform=iOS Simulator,id=$UDID"
